<!DOCTYPE html>
<html>
<head>
    <title>Friend Chat 💖</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            text-align: center;
            color: white;
        }

        #messages {
            height: 250px;
            overflow-y: scroll;
            background: white;
            color: black;
            padding: 10px;
            border-radius: 10px;
            margin: 10px;
        }

        .msg {
            background: #ffe6ec;
            margin: 5px;
            padding: 8px;
            border-radius: 10px;
            text-align: left;
        }

        input {
            width: 50%;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin: 5px;
            background: red;
            color: white;
            cursor: pointer;
        }

        video {
            margin: 5px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>💖 Friend Chat 💖</h1>

<div id="messages"></div>

<input id="msg" placeholder="Type message ❤️">
<button onclick="sendMsg()">Send</button>

<br><br>

<button onclick="startCall()">📞 Call</button>
<button onclick="endCall()">❌ End</button>

<br><br>

<video id="localVideo" autoplay muted width="200"></video>
<video id="remoteVideo" autoplay width="200"></video>

<br><br>

<input type="file" id="fileInput">

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

/* ================= CHAT ================= */

function sendMsg() {
    let msg = document.getElementById("msg").value;

    socket.emit("chat message", {
        type: "text",
        msg: msg
    });

    document.getElementById("msg").value = "";
}

socket.on("chat message", function(data) {
    let div = document.getElementById("messages");

    if(data.type === "text"){
        div.innerHTML += "<div class='msg'>💖 " + data.msg + "</div>";
    }
    else if(data.type === "image"){
        div.innerHTML += "<div class='msg'><img src='"+data.msg+"' width='150'></div>";
    }
    else if(data.type === "video"){
        div.innerHTML += "<div class='msg'><video src='"+data.msg+"' width='150' controls></video></div>";
    }

    div.scrollTop = div.scrollHeight;
});

/* ================= FILE ================= */

document.getElementById("fileInput").addEventListener("change", function(){
    let file = this.files[0];
    let reader = new FileReader();

    reader.onload = function(e){
        let data = e.target.result;

        if(file.type.startsWith("image")){
            socket.emit("chat message", { type: "image", msg: data });
        }
        else if(file.type.startsWith("video")){
            socket.emit("chat message", { type: "video", msg: data });
        }
    };

    reader.readAsDataURL(file);
});

/* ================= VIDEO CALL ================= */

let localStream;
let peerConnection;

const servers = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

// Get camera + mic
navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
    localStream = stream;
    document.getElementById("localVideo").srcObject = stream;
});

// Start call
function startCall() {

    peerConnection = new RTCPeerConnection(servers);

    // add local stream
    localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
    });

    // receive remote stream
    peerConnection.ontrack = event => {
        document.getElementById("remoteVideo").srcObject = event.streams[0];
    };

    // send ice
    peerConnection.onicecandidate = event => {
        if (event.candidate) {
            socket.emit("signal", {
                candidate: event.candidate
            });
        }
    };

    // create offer
    peerConnection.createOffer()
    .then(offer => peerConnection.setLocalDescription(offer))
    .then(() => {
        socket.emit("signal", {
            offer: peerConnection.localDescription
        });
    });
}

// Receive signal
socket.on("signal", async (data) => {

    if (data.offer) {

        peerConnection = new RTCPeerConnection(servers);

        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
        });

        peerConnection.ontrack = event => {
            document.getElementById("remoteVideo").srcObject = event.streams[0];
        };

        await peerConnection.setRemoteDescription(data.offer);

        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        socket.emit("signal", {
            answer: answer
        });
    }

    if (data.answer) {
        await peerConnection.setRemoteDescription(data.answer);
    }

    if (data.candidate) {
        await peerConnection.addIceCandidate(data.candidate);
    }
});

// End call
function endCall() {
    if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
    }
}
</script>

</body>
</html>
